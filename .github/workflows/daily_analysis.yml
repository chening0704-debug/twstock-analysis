name: 台股每日自動分析

on:
  schedule:
    - cron: '30 15 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝 Python 套件
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 還原 SQLite 快取
        uses: actions/cache@v4
        with:
          path: data/
          key: sqlite-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            sqlite-${{ runner.os }}-

      - name: 還原 RF 模型快取
        uses: actions/cache@v4
        with:
          path: models/
          key: rf-model-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            rf-model-${{ runner.os }}-

      - name: 執行分析
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          EMAIL_USER:    ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:    ${{ secrets.EMAIL_PASS }}
          EMAIL_TARGET:  ${{ secrets.EMAIL_TARGET }}
        run: python main.py

      - name: 提交分析結果
        if: always()
        run: |
          git config user.name  "twstock-bot"
          git config user.email "bot@twstock.local"
          git add reports/ logs/ portfolio.xlsx || true
          git diff --staged --quiet || \
            git commit -m "📊 日報 $(date '+%Y-%m-%d')"
          git push || true

      - name: 部署到 GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./reports
          force_orphan: true
